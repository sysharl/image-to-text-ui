<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Add Quote</title>
    <link
      href="{{ url_for('static', filename='css/bootstrap.min.css') }}"
      rel="stylesheet"
    />
    <!-- Bootstrap theme -->
    <link
      href="{{ url_for('static', filename='css/bootstrap-theme.min.css') }}"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/parent.css') }}"
    />

    <!-- Custom styles for this template -->
    <link
      href="{{ url_for('static', filename='css/upload_page.css') }}"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Upload Image</h1>

      <form
        id="uploadForm"
        method="POST"
        enctype="multipart/form-data"
        action="/upload-image"
      >
          <div class="upload-file-area" id="dropZone">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="45"
              height="45"
              fill="currentColor"
              class="bi bi-cloud-plus"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M8 5.5a.5.5 0 0 1 .5.5v1.5H10a.5.5 0 0 1 0 1H8.5V10a.5.5 0 0 1-1 0V8.5H6a.5.5 0 0 1 0-1h1.5V6a.5.5 0 0 1 .5-.5"
              />
              <path
                d="M4.406 3.342A5.53 5.53 0 0 1 8 2c2.69 0 4.923 2 5.166 4.579C14.758 6.804 16 8.137 16 9.773 16 11.569 14.502 13 12.687 13H3.781C1.708 13 0 11.366 0 9.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383m.653.757c-.757.653-1.153 1.44-1.153 2.056v.448l-.445.049C2.064 6.805 1 7.952 1 9.318 1 10.785 2.23 12 3.781 12h8.906C13.98 12 15 10.988 15 9.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 4.825 10.328 3 8 3a4.53 4.53 0 0 0-2.941 1.1z"
              />
            </svg>
            <p>Drag & drop files here or click to browse file</p>
            <input
              type="file"
              id="fileInput"
              name="image_uploaded"
              multiple
              style="display: none"
            />
          </div>
          <div>
            <ul id="fileList" class="list-group mt-3"></ul>
          </div>
        <button type="submit" class="btn" id="submit">Upload</button>
      </form>

      <div id="loadingScreen">
        <div class="screen">
          <div class="spinner"></div>
          <h3>Uploading and extracting text... Please wait</h3>
        </div>
      </div>
    </div>
    <script src="{{url_for('static',filename='js/upload.js')}}"></script>
  </body>
</html>

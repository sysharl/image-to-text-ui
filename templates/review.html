<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review & Edit OCR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
      href="{{ url_for('static', filename='css/review.css') }}"
      rel="stylesheet"
    />

</head>
<body>
  <h1>Review & Edit (Batch: {{ batch_id }})</h1>

  <form method="POST" action="/save/{{ batch_id }}">
    <div class="content">
      {% for item in review_data %}
      <div class="card">
        <div class="card-header">
          <strong>{{ item.filename }}</strong>
          <span class="chip">Editable</span>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col img-wrap">
                    <img src="{{ url_for('static', filename= 'uploads/' + item.image_url )}}" class="img-fluid d-block mx-auto" alt="{{ item.filename }}">
                </div>
                <div class="col text-wrap ">
                    <textarea class="complete-text" name="texts_{{loop.index0}}" id="texts_{{loop.index0 }}">{{ item.text }}</textarea>
                    <input type="hidden" name="file_{{loop.index0}}" value="{{ item.image_url }}">
                    <button type="button" class="mb-2" onClick="createSegment('{{loop.index0}}')">Create Segment</button>
                    <div id="segments_{{loop.index0}}"></div>
                </div>
            </div>
        </div>
      </div>
      {% endfor %}
    </div>

    <div class="toolbar">
      <button type="submit">Save All</button>
    </div>
  </form>

  <script src="{{url_for('static',filename='js/review.js')}}"></script>
</body>
</html>
